name: Release

on:
  workflow_dispatch:
    inputs:
      publish_to_marketplace:
        description: 'Publish to JetBrains Marketplace (requires PUBLISH_TOKEN secret)'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & release
    runs-on: ubuntu-latest
    # Expose secrets as job-level env vars. PUBLISH_TOKEN's presence is checked in a step
    # condition below; CERTIFICATE_CHAIN / PRIVATE_KEY / PRIVATE_KEY_PASSWORD are read by the
    # Gradle `signing {}` block so `publishPlugin` signs the artifact before upload. Absent
    # signing secrets simply skip signing rather than failing the build.
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6

      - name: Build plugin distribution
        run: ./gradlew buildPlugin

      # Gate the release on the JetBrains Plugin Verifier so a tag can never publish an
      # artifact that was not checked against the target IDEs (ci.yml does not run on tags).
      - name: Verify plugin compatibility
        run: ./gradlew verifyPlugin

      - name: Upload plugin ZIP as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: git-arborist-${{ github.ref_name }}
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Git Arborist ${{ github.ref_name }}" \
            --generate-notes \
            build/distributions/*.zip

      # Publishes to JetBrains Marketplace when PUBLISH_TOKEN is present and either:
      #   - a version tag triggered the run, or
      #   - workflow_dispatch was used with publish_to_marketplace: true
      - name: Publish to JetBrains Marketplace
        if: >
          env.PUBLISH_TOKEN != '' &&
          (
            startsWith(github.ref, 'refs/tags/v') ||
            (github.event_name == 'workflow_dispatch' && inputs.publish_to_marketplace)
          )
        run: ./gradlew publishPlugin
