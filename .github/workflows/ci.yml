name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Build & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint, test, build
        run: ./gradlew ktlintCheck detekt test build

  verify-plugin:
    name: Verify plugin compatibility
    runs-on: ubuntu-latest
    # Skip draft PRs — this job downloads two full IDE installations.
    # For push events github.event.pull_request is null, so !null == true (runs).
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Plugin Verifier
        run: ./gradlew verifyPlugin
